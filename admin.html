<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administracyjny - Rejestr Państwowy</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <img src="herb.png" alt="Herb" class="gov-logo">
            <div class="header-text">
                <h1>Centralne Biuro Postaci i Ról</h1>
                <p>System Ewidencji Tożsamości i Archiwizacji</p>
            </div>
        </div>
    </header>

    <div class="container">
        <section id="login-section">
            <h2>Autoryzacja Urzędowa</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="E-mail" required>
                <input type="password" id="login-password" placeholder="Hasło" required>
                <button type="submit">Zaloguj</button>
            </form>
        </section>

        <div id="admin-panel" class="hidden">
            <button id="logout-btn" class="delete" style="float: right;">Wyloguj</button>
            
            <section>
                <h3>Zarządzanie Rolami</h3>
                <form id="role-form">
                    <input type="hidden" id="role-id">
                    <input type="text" id="role-name" placeholder="Nazwa roli" required>
                    <textarea id="role-desc" placeholder="Opis roli"></textarea>
                    <label>Kolor kafelka:</label>
                    <input type="color" id="role-color" value="#002366">
                    <button type="submit" id="role-submit-btn">Zapisz Rolę</button>
                </form>
                <div id="roles-list"></div>
            </section>

            <section>
                <h3>Ewidencja Postaci</h3>
                <form id="char-form">
                    <input type="hidden" id="char-id">
                    
                    <label>Numer Rejestru (ID):</label>
                    <input type="number" id="char-registry-no" placeholder="Zostaw puste dla auto-numeracji">
                    
                    <label>Imię i Nazwisko:</label>
                    <input type="text" id="char-name" required>
                    
                    <label>Biografia:</label>
                    <textarea id="char-bio"></textarea>

                    <label>Zdjęcie Postaci:</label>
                    <input type="file" id="char-image" accept="image/*">
                    <input type="hidden" id="char-foto-url">

                    <label>Przypisz Role (Ctrl + klik):</label>
                    <select id="char-roles" multiple style="height: 100px;"></select>
                    
                    <button type="submit" id="char-submit-btn">Zapisz w Rejestrze</button>
                </form>
                <div id="chars-list"></div>
            </section>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://dagmflfhbvgszthpinqd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhZ21mbGZoYnZnc3p0aHBpbnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzY4ODgsImV4cCI6MjA5MjM1Mjg4OH0.cDkiR3zL68xNOi1p7NQeVYoXoVqoQk70SLmhG8xmMFs';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // --- LOGIN ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            });
            if (error) alert(error.message);
            else {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                refreshData();
            }
        });

        // --- ZAPIS ROLI ---
        document.getElementById('role-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('role-id').value;
            const data = {
                nazwa: document.getElementById('role-name').value,
                opis: document.getElementById('role-desc').value,
                kolor: document.getElementById('role-color').value
            };
            const { error } = id ? await supabaseClient.from('role').update(data).eq('id', id) : await supabaseClient.from('role').insert([data]);
            if (error) alert(error.message); else { document.getElementById('role-form').reset(); refreshData(); }
        });

        // --- ZAPIS POSTACI (Z OBRAZKIEM I NUMEREM ID) ---
        document.getElementById('char-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('char-id').value;
            const file = document.getElementById('char-image').files[0];
            let fotoUrl = document.getElementById('char-foto-url').value;

            // 1. Jeśli jest nowy plik, wgraj go do Storage
            if (file) {
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage.from('zdjecia').upload(fileName, file);
                if (!uploadError) {
                    const { data: publicUrlData } = supabaseClient.storage.from('zdjecia').getPublicUrl(fileName);
                    fotoUrl = publicUrlData.publicUrl;
                }
            }

            // 2. Przygotuj dane
            const payload = {
                imie: document.getElementById('char-name').value,
                biografia: document.getElementById('char-bio').value,
                foto_url: fotoUrl
            };
            
            const customId = document.getElementById('char-registry-no').value;
            if (customId) payload.numer_rejestru = parseInt(customId);

            // 3. Zapisz w bazie
            let res;
            if (id) res = await supabaseClient.from('postacie').update(payload).eq('id', id).select().single();
            else res = await supabaseClient.from('postacie').insert([payload]).select().single();

            if (res.error) alert(res.error.message);
            else {
                const postacId = res.data.id;
                const wybraneRole = Array.from(document.getElementById('char-roles').selectedOptions).map(o => o.value);
                await supabaseClient.from('postacie_role').delete().eq('postać_id', postacId);
                if (wybraneRole.length) {
                    await supabaseClient.from('postacie_role').insert(wybraneRole.map(rId => ({ postać_id: postacId, rola_id: rId })));
                }
                document.getElementById('char-form').reset();
                refreshData();
            }
        });

        // --- FUNKCJE POMOCNICZE ---
        async function refreshData() {
            const { data: role } = await supabaseClient.from('role').select('*').order('nazwa');
            const { data: postacie } = await supabaseClient.from('postacie').select('*, postacie_role(rola_id)').order('created_at', {ascending: false});

            const sel = document.getElementById('char-roles');
            sel.innerHTML = '';
            role?.forEach(r => sel.innerHTML += `<option value="${r.id}">${r.nazwa}</option>`);

            renderList('role', 'roles-list', role || [], 'nazwa', 'editRole');
            renderList('postacie', 'chars-list', postacie || [], 'imie', 'editChar');
        }

        function renderList(table, containerId, data, label, editFnName) {
            const container = document.getElementById(containerId);
            container.innerHTML = '<h4>Lista wpisów:</h4>';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>[${item.numer_rejestru || 'ID'}] ${item[label]}</span>
                    <div><button onclick='window["${editFnName}"](${JSON.stringify(item).replace(/'/g, "&apos;")})'>Edytuj</button>
                    <button class="delete" onclick="deleteItem('${table}', '${item.id}')">Usuń</button></div>`;
                container.appendChild(div);
            });
        }

        window.editRole = (item) => {
            document.getElementById('role-id').value = item.id;
            document.getElementById('role-name').value = item.nazwa;
            document.getElementById('role-desc').value = item.opis;
            document.getElementById('role-color').value = item.kolor;
        };

        window.editChar = (item) => {
            document.getElementById('char-id').value = item.id;
            document.getElementById('char-name').value = item.imie;
            document.getElementById('char-bio').value = item.biografia;
            document.getElementById('char-registry-no').value = item.numer_rejestru;
            document.getElementById('char-foto-url').value = item.foto_url || '';
            const roleIds = item.postacie_role.map(pr => pr.rola_id);
            Array.from(document.getElementById('char-roles').options).forEach(opt => opt.selected = roleIds.includes(opt.value));
        };

        window.deleteItem = async (table, id) => {
            if (confirm("Usunąć?")) { await supabaseClient.from(table).delete().eq('id', id); refreshData(); }
        };

        document.getElementById('logout-btn').onclick = () => location.reload();
    </script>
</body>
</html>
