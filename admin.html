<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora - Państwo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css"> <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .hidden { display: none; }
        section { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        form { display: flex; flex-direction: column; gap: 10px; }
        input, textarea, select { padding: 8px; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button.delete { background: #dc3545; }
        .list-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>

    <h1>Panel Administratora</h1>

    <section id="login-section">
        <h2>Zaloguj się</h2>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="E-mail admina" required>
            <input type="password" id="login-password" placeholder="Hasło" required>
            <button type="submit">Zaloguj</button>
        </form>
    </section>

    <div id="admin-panel" class="hidden">
        <button id="logout-btn" style="float: right;">Wyloguj</button>
        <p>Witaj, Panie Administratorze!</p>

        <section>
            <h3>Stwórz Nową Rolę</h3>
            <form id="role-form">
                <input type="text" id="role-name" placeholder="Nazwa roli (np. Rycerz)" required>
                <textarea id="role-desc" placeholder="Opis roli"></textarea>
                <button type="submit">Dodaj Rolę</button>
            </form>
            <div id="roles-list"></div>
        </section>

        <section>
            <h3>Stwórz Nową Postać</h3>
            <form id="char-form">
                <input type="text" id="char-name" placeholder="Imię postaci" required>
                <textarea id="char-bio" placeholder="Biografia"></textarea>
                <select id="char-role" required>
                    <option value="">-- Wybierz rolę --</option>
                </select>
                <button type="submit">Dodaj Postać</button>
            </form>
            <div id="chars-list"></div>
        </section>
    </div>

    <script>
    // 1. Dane dostępowe (Upewnij się, że są poprawne!)
    const supabaseUrl = 'https://dagmflfhbvgszthpinqd.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhZ21mbGZoYnZnc3p0aHBpbnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzY4ODgsImV4cCI6MjA5MjM1Mjg4OH0.cDkiR3zL68xNOi1p7NQeVYoXoVqoQk70SLmhG8xmMFs';

    // 2. Inicjalizacja klienta w wersji przeglądarkowej
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Pobranie elementów z HTML
    const loginForm = document.getElementById('login-form');
    const loginSection = document.getElementById('login-section');
    const adminPanel = document.getElementById('admin-panel');
    const charRoleSelect = document.getElementById('char-role');

    // --- 1. LOGOWANIE ---
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        // Używamy supabaseClient zamiast supabase
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Błąd logowania: " + error.message);
        } else {
            console.log("Zalogowano!", data);
            loginSection.classList.add('hidden');
            adminPanel.classList.remove('hidden');
            refreshData();
        }
    });

    // --- 2. DODAWANIE ROLI ---
    document.getElementById('role-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nazwa = document.getElementById('role-name').value;
        const opis = document.getElementById('role-desc').value;

        const { error } = await supabaseClient.from('role').insert([{ nazwa, opis }]);
        if (error) alert("Błąd dodawania roli: " + error.message);
        else {
            e.target.reset();
            refreshData();
        }
    });

    // --- 3. DODAWANIE POSTACI ---
    document.getElementById('char-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const imie = document.getElementById('char-name').value;
        const biografia = document.getElementById('char-bio').value;
        const rola_id = document.getElementById('char-role').value;

        const { error } = await supabaseClient.from('postacie').insert([{ imie, biografia, rola_id }]);
        if (error) alert("Błąd dodawania postaci: " + error.message);
        else {
            e.target.reset();
            refreshData();
        }
    });

    // --- 4. ODŚWIEŻANIE DANYCH ---
    async function refreshData() {
        // Pobierz role do listy rozwijanej
        const { data: role } = await supabaseClient.from('role').select('*');
        charRoleSelect.innerHTML = '<option value="">-- Wybierz rolę --</option>';
        if (role) {
            role.forEach(r => {
                charRoleSelect.innerHTML += `<option value="${r.id}">${r.nazwa}</option>`;
            });
        }

        renderList('role', 'roles-list', 'nazwa');
        renderList('postacie', 'chars-list', 'imie');
    }

    async function renderList(table, elementId, labelKey) {
        const { data } = await supabaseClient.from(table).select('*');
        const container = document.getElementById(elementId);
        container.innerHTML = '<h4>Lista:</h4>';
        if (data) {
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <span>${item[labelKey]}</span>
                    <button class="delete" onclick="deleteItem('${table}', '${item.id}')">Usuń</button>
                `;
                container.appendChild(div);
            });
        }
    }

    // Funkcja usuwania
    window.deleteItem = async (table, id) => {
        if (confirm("Czy na pewno chcesz to usunąć?")) {
            const { error } = await supabaseClient.from(table).delete().eq('id', id);
            if (error) alert(error.message);
            else refreshData();
        }
    };

    document.getElementById('logout-btn').onclick = () => location.reload();
</script>
</body>
</html>
